<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Details - MUST Student Activities Hub</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: rgb(28, 48, 110);
            --secondary: rgb(0, 172, 92);
            --bg-light: #F8FAFC;
            --white: #FFFFFF;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .details-container {
            max-width: 900px;
            width: 95%;
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin: 2rem 0;
        }

        .details-img-wrapper {
            width: 100%;
            height: 450px;
            overflow: hidden;
            background-color: rgba(28, 48, 110, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #newsImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-content {
            padding: 2.5rem;
        }

        #newsTitle {
            color: var(--primary);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .meta-info {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-gray);
            font-size: 0.95rem;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 1rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meta-item i {
            color: var(--secondary);
        }

        #newsContent {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
            text-align: justify;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--white);
            background-color: var(--primary);
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-btn:hover {
            background-color: var(--secondary);
            color: var(--white);
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .details-img-wrapper {
                height: 300px;
            }
            #newsTitle {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="details-container">
        <div class="details-img-wrapper">
            <img id="newsImg" src="img/news5.jpg" alt="News Image" onerror="this.src='img/news5.jpg'" />
        </div>
        <div class="details-content">
            <h1 id="newsTitle">Loading News...</h1>
            
            <div class="meta-info">
                <span class="meta-item"><i class="fas fa-calendar"></i> <span id="newsDate"></span></span>
                <span class="meta-item"><i class="fas fa-user"></i> <span>MUST Admin</span></span>
            </div>
            
            <div id="newsContent">Please wait while we fetch the news details.</div>
            
            <div style="margin-top: 30px;">
                <a href="allNews.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to News</a>
            </div>
        </div>
    </div>

    <script src="js/news-details.js"></script>
</body>

</html>
