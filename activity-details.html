<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Details</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: rgb(28, 48, 110);
            --secondary: rgb(0, 172, 92);
            --bg-light: #F8FAFC;
            --white: #FFFFFF;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .details-container {
            max-width: 800px;
            width: 90%;
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin: 2rem 0;
        }

        .details-img-wrapper {
            width: 100%;
            height: 400px;
            overflow: hidden;
            background-color: var(--primary-light, rgba(28, 48, 110, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #detailImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-content {
            padding: 2rem;
        }

        #detailTitle {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .meta-info {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meta-item i {
            color: var(--secondary);
        }

        #detailDesc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 2rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--white);
            background-color: var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-btn:hover {
            background-color: var(--secondary);
            color: var(--white);
        }
        
        #registerBtn {
            display: inline-block;
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }
        
        #registerBtn:hover {
            background-color: rgb(0, 145, 75);
        }
    </style>
</head>

<body>
    <div class="details-container">
        <div class="details-img-wrapper">
            <img id="detailImg" src="" alt="Activity Image" />
        </div>
        <div class="details-content">
            <h1 id="detailTitle">Loading...</h1>
            
            <div class="meta-info">
                <span class="meta-item"><i class="fas fa-clock"></i> <span id="detailDuration"></span></span>
                <span class="meta-item"><i class="fas fa-users"></i> <span id="detailPlayers"></span></span>
                <span class="meta-item"><i class="fas fa-tag"></i> <span id="detailCategory"></span></span>
            </div>
            
            <p id="detailDesc">Please wait while we fetch the activity details.</p>
            
            <div style="display: flex; gap: 15px; align-items: center; margin-top: 20px;">
                <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Go Back</a>
                <button id="registerBtn">Register</button>
            </div>
        </div>
    </div>

    <!-- Script connection to match requirements -->
    <script src="js/activity-details.js"></script>
</body>

</html>
